<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Ultimate Note</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #FFFDF5;
            color: #091E13;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
        }
        .card {
            max-width: 480px;
            text-align: center;
            padding: 3rem 2rem;
        }
        h1 { color: #1A3C2A; font-size: 2.25rem; margin-bottom: 0.5rem; }
        .tagline { color: #B8932B; font-weight: 600; font-size: 1.1rem; margin-bottom: 2rem; }
        .description { color: #5A8A6A; line-height: 1.7; margin-bottom: 2rem; }
        .links { display: flex; flex-direction: column; gap: 0.75rem; }
        .links a {
            display: block;
            padding: 0.75rem 1.5rem;
            background: #1A3C2A;
            color: #FAF0D0;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 500;
            transition: background 0.2s;
        }
        .links a:hover { background: #2D6B4A; }
        .links a.secondary {
            background: transparent;
            color: #1A3C2A;
            border: 1px solid #D4B560;
        }
        .links a.secondary:hover { background: #FAF0D020; }
    </style>
</head>
<body>
    <div class="card">
        <h1>The Ultimate Note</h1>
        <p class="tagline">Plan. Prioritize. Learn. Journal. Grow.</p>
        <p class="description">
            Your all-in-one productivity companion. Kanban boards, Eisenhower priority matrix,
            daily planner, journaling, and AI assistant &mdash; exactly enough to stay organized.
        </p>
        <div class="links">
            <a href="privacy-policy.html">Privacy Policy</a>
            <a href="terms-of-service.html" class="secondary">Terms of Service</a>
        </div>
    </div>
</body>
</html>
